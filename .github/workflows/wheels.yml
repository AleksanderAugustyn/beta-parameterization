name: wheels
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
permissions:
  contents: write            # create/upload the Release
jobs:
  linux-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # tags for setuptools_scm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y gfortran cmake make patchelf
      - name: Build wheel
        working-directory: python
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_BETA_PARAMETERIZATION: ${{ github.ref_name }}
          CMAKE_GENERATOR: Unix Makefiles
        run: |
          python -m pip install --upgrade build auditwheel
          python -m build --wheel --outdir ../dist_raw
      - name: Repair (vendor libgfortran, manylinux tag)
        run: python -m auditwheel repair dist_raw/*.whl -w wheelhouse
      - name: Verify in clean venv
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install wheelhouse/*.whl pytest numpy
          env -u BETA_PARAM_LIB /tmp/verify/bin/python -m pytest python/tests -q
      - name: Upload wheel to Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
      # Later (PyPI): add a pypa/gh-action-pypi-publish job using the same wheelhouse/*.whl.
